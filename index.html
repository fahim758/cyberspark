<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Spark Global</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins', sans-serif;
  background: linear-gradient(135deg, #0a0f2c, #121a3a);
  color:white;
}

.container{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:60px 8%;
  min-height:100vh;
}

.left{
  max-width:50%;
}

.logo{
  font-size:22px;
  font-weight:700;
  margin-bottom:20px;
  color:#00d4ff;
}

h1{
  font-size:42px;
  line-height:1.3;
}

.blue{
  color:#00d4ff;
}

.gold{
  background:linear-gradient(90deg, gold, orange);
  -webkit-background-clip:text;
  color:transparent;
}

.sub{
  margin:15px 0;
  color:#bbb;
}

.services div{
  margin:10px 0;
}

.cta{
  margin-top:25px;
}

.btn{
  padding:12px 22px;
  border-radius:25px;
  text-decoration:none;
  margin-right:10px;
  font-weight:500;
}

.primary{
  background:#00d4ff;
  color:#000;
}

.secondary{
  border:1px solid #666;
  color:#fff;
}

.right img{
  width:350px;
  border-radius:15px;
}

/* MOBILE */
@media(max-width:900px){
  .container{
    flex-direction:column;
    text-align:center;
  }

  .left{
    max-width:100%;
  }

  .right img{
    width:250px;
    margin-top:30px;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="left">
  <div class="logo">Cyber Spark Global</div>

  <h1>
    Grow Your Business with 
    <span class="blue">Smart</span> 
    <span class="gold">Digital Solutions</span>
  </h1>

  <p class="sub">Build • Rank • Succeed Online</p>

  <div class="services">
    <div>✔ Website Development</div>
    <div>✔ SEO Optimization</div>
    <div>✔ Digital Marketing</div>
    <div>✔ App Development</div>
  </div>

  <div class="cta">
    <a href="#" class="btn primary">Visit Website</a>
    <a href="#" class="btn secondary">Inbox Us</a>
  </div>
</div>

<div class="right">
  <!-- LOCAL IMAGE USE -->
  <img src="businessman.png" alt="businessman">
</div>

</div>

</body>
</html>
