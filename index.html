<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Spark Global</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0a0f2c, #1a1f4d);
  color: white;
}

.container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 60px;
}

.left {
  max-width: 50%;
}

.logo {
  font-weight: 700;
  font-size: 22px;
  margin-bottom: 20px;
}

h1 {
  font-size: 42px;
  line-height: 1.3;
}

.highlight-blue {
  color: #00d4ff;
  text-shadow: 0 0 10px #00d4ff;
}

.highlight-gold {
  background: linear-gradient(90deg, gold, orange);
  -webkit-background-clip: text;
  color: transparent;
}

.sub {
  margin: 15px 0;
  color: #ccc;
}

.services {
  margin-top: 20px;
}

.services div {
  margin: 8px 0;
}

.cta {
  margin-top: 30px;
}

.btn {
  display: inline-block;
  padding: 12px 22px;
  margin-right: 10px;
  border-radius: 25px;
  text-decoration: none;
  color: white;
  font-weight: 500;
}

.primary {
  background: #00d4ff;
  box-shadow: 0 0 15px #00d4ff;
}

.secondary {
  border: 1px solid #888;
}

.right img {
  width: 350px;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="container">

<div class="left">
  <div class="logo">Cyber Spark Global</div>

  <h1>
    Grow Your Business with 
    <span class="highlight-blue">Smart</span> 
    <span class="highlight-gold">Digital Solutions</span>
  </h1>

  <div class="sub">Build • Rank • Succeed Online</div>

  <div class="services">
    <div>✔ Website Development</div>
    <div>✔ SEO Optimization</div>
    <div>✔ Digital Marketing</div>
    <div>✔ App Development</div>
  </div>

  <div class="cta">
    <a href="#" class="btn primary">Visit Website</a>
    <a href="#" class="btn secondary">Inbox Us</a>
  </div>
</div>

<div class="right">
  <img src="https://images.unsplash.com/photo-1600880292089-90e0b6b6e3c4" alt="businessman">
</div>

</div>

</body>
</html>
